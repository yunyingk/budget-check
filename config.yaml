# 预算校验服务配置文件
# 部署时与 budget-check.exe 放在同一目录

# 服务端口配置
server:
  port: 8000  # HTTP 服务监听端口

# 合思开放平台配置
# 从合思管理员后台获取，用于调用合思 API 获取 Token
ekuaibao:
  host: "https://app.ekuaibao.com"  # 合思 API 域名，不带路径
  app_key: "9c5b3631-0e6a-4b3e-afcd-7d6fcfc377ca"    # 应用 Key
  app_secret: "d866a007-78a3-4bfd-972e-9ea1bf87a3d5"  # 应用 Secret

# 费用性质 ID 映射
# 合思单据中 u_费用性质 字段的值是 ID，需要映射为中文名称用于分支判断
# 新增性质时在这里添加即可，代码无需改动
expense_nature:
  ID01LPD78hZRsr: "业务"
  ID01LPDisfN3qv: "管理"
  ID01LPDfjPcnyn: "生产"

# 预算同步白名单及钻取深度
# 只有 name 关键词匹配到的预算包才会被同步，depth 控制向下钻取几层子节点
# depth=1 只拉一层，depth=3 拉三层（部门-档案-项目）
# 未出现在此列表中的预算包会被跳过
budget_targets:
  - name: "2026成本中心预算"  # 包含此关键词的预算包
    depth: 3                  # 向下钻取 3 层
  - name: "项目预算包"         # 包含此关键词的预算包
    depth: 1                  # 向下钻取 1 层

# 预算数据自动同步间隔
sync:
  interval_minutes: 60  # 每隔多少分钟自动同步一次预算数据

# 日志级别 (预留，暂未实现)
logging:
  level: "info"  # debug / info / warn / error