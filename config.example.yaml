# 预算校验服务配置文件
# 部署时与 budget-check.exe 放在同一目录

# 服务端口配置
server:
  port: 8000  # HTTP 服务监听端口

# 合思开放平台配置
# 从合思管理员后台获取，用于调用合思 API 获取 Token
ekuaibao:
  host: "https://app.ekuaibao.com"  # 合思 API 域名，不带路径
  app_key: "your-app-key-here"      # 应用 Key
  app_secret: "your-app-secret-here" # 应用 Secret

# Webhook 配置（可多个）
# 每个 webhook 下属的预算包 id 会被同步拉取
webhooks:
  budget-check:
    sign_key: "your-sign-key-here"  # 出站消息签名密钥，用于回调审批
    targets:
      - id: "ID01T5nPu92vH9"        # 2026成本中心预算包
        name: "成本中心预算"
      - id: "ID01RFKVaUa4q3"        # 项目预算包
        name: "项目预算"

# 预算数据自动同步间隔
sync:
  interval_minutes: 60  # 每隔多少分钟自动同步一次预算数据
  workers: 10           # 同步并发数
  queue_size: 100       # 校验任务队列最大长度

# 日志配置
logging:
  level: "info"           # debug / info / warn / error
  rotation: "daily"       # 日志轮转周期: daily(每天) / weekly(每周) / monthly(每月)
  # 文件命名示例: daily=2026-05-20.log  weekly=2026-W21.log  monthly=2026-05.log

# Web 管理页面（可选）
# 启用后访问 / 查看服务状态和预算信息
web:
  enabled: true           # 设为 true 启用管理页面
  password: ""            # 登录密码，为空则不需要密码
  admin_password: ""      # 管理员密码，保护同步、规则保存、新建 webhook、查看配置等敏感操作

# 维度字段名映射：内部字段 ID → 中文名称，用于规则引擎错误提示
dimension_names:
  E_system_costcenter: "成本中心"
  u_费用类型档案: "费用类型"
  项目: "项目"
